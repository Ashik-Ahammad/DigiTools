version: "3.8" 

services:
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: digitools-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - digitools_net
    volumes:
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  digitools_net:
    driver: bridge

volumes:
  nginx_logs:
